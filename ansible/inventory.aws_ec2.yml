plugin: amazon.aws.aws_ec2

regions:
  - us-east-1

filters:
  tag:Project: ms-learning
  instance-state-name: running

# Use public IP when the instance has one (public subnet), fall back to
# private IP (private subnet instances — reached via ProxyJump from Jenkins).
hostnames:
  - ip-address
  - private-ip-address

compose:
  ansible_user: "'ec2-user'"

groups:
  config_server:   "tags.Name == 'ms-learning-config-server'"
  eureka_server:   "tags.Name == 'ms-learning-eureka-server'"
  rabbitmq:        "tags.Name == 'ms-learning-rabbitmq'"
  keycloak:        "tags.Name == 'ms-learning-keycloak'"
  jenkins:         "tags.Name == 'ms-learning-jenkins'"
  monitoring:      "tags.Name == 'ms-learning-monitoring'"
  app_servers:     "tags.Name == 'ms-learning-app-asg'"

  # These four have no public IP — Ansible reaches them via Jenkins ProxyCommand.
  # group_vars/private_hosts.yml sets ansible_ssh_common_args for this group.
  private_hosts: >-
    tags.Name in [
      'ms-learning-config-server',
      'ms-learning-eureka-server',
      'ms-learning-rabbitmq',
      'ms-learning-keycloak'
    ]

  # Directly reachable via their public IPs.
  public_hosts: >-
    tags.Name in [
      'ms-learning-jenkins',
      'ms-learning-monitoring',
      'ms-learning-app-asg'
    ]
