---
# Ordered deployment: each import_playbook blocks until the previous service
# passes its health check before the next one starts.
#
# Required extra vars (set by Jenkinsfile or passed manually):
#   build_number          — Jenkins BUILD_NUMBER, locates JARs in S3
#   s3_bucket             — S3 bucket name (default: ms-learning-artifacts)
#   eureka_host           — private IP of the eureka-server EC2 instance
#   config_host           — private IP of the config-server EC2 instance
#   rabbitmq_host         — private IP of the RabbitMQ EC2 instance
#   keycloak_host         — private IP of the Keycloak EC2 instance
#   db_host               — private IP of the PostgreSQL server
#   db_password           — PostgreSQL password
#   keycloak_issuer_uri   — e.g. http://<keycloak_host>:9090/realms/ms-learning
#   config_repo_uri       — Git URI config-server uses for prod config files
#   user_service_host     — private IP of the user-service EC2 instance
#   payment_service_host  — private IP of the payment-service EC2 instance

# 1. Config Server
- import_playbook: deploy-service.yml
  vars:
    target_hosts: config_server
    service_name: config-server
    service_port: 8888
    jar_s3_path: "s3://{{ s3_bucket | default('ms-learning-artifacts') }}/{{ build_number }}/config-server.jar"
    env_vars:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8888"
      CONFIG_REPO_URI: "{{ config_repo_uri }}"
      CONFIG_REPO_BRANCH: main
      EUREKA_URL: "http://{{ eureka_host }}:8761/eureka"
      INTERNAL_API_KEY: "{{ internal_api_key }}"

# 2. Eureka Server
- import_playbook: deploy-service.yml
  vars:
    target_hosts: eureka_server
    service_name: eureka-server
    service_port: 8761
    jar_s3_path: "s3://{{ s3_bucket | default('ms-learning-artifacts') }}/{{ build_number }}/eureka-server.jar"
    env_vars:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8761"
      EUREKA_HOSTNAME: "{{ eureka_host }}"
      INTERNAL_API_KEY: "{{ internal_api_key }}"

# 3. User Service  (uses DynamoDB — no PostgreSQL needed)
- import_playbook: deploy-service.yml
  vars:
    target_hosts: user_servers
    service_name: user-service
    service_port: 8081
    jar_s3_path: "s3://{{ s3_bucket | default('ms-learning-artifacts') }}/{{ build_number }}/user-service.jar"
    env_vars:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8081"
      AWS_REGION: us-east-1
      USERS_TABLE: users
      SPRING_CLOUD_CONFIG_URI: "http://{{ config_host }}:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://{{ eureka_host }}:8761/eureka"
      KEYCLOAK_ISSUER_URI: "{{ keycloak_issuer_uri }}"
      INTERNAL_API_KEY: "{{ internal_api_key }}"

# 4. Payment Service  (PostgreSQL + RabbitMQ)
- import_playbook: deploy-service.yml
  vars:
    target_hosts: payment_servers
    service_name: payment-service
    service_port: 8082
    jar_s3_path: "s3://{{ s3_bucket | default('ms-learning-artifacts') }}/{{ build_number }}/payment-service.jar"
    env_vars:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8082"
      DATASOURCE_URL: "jdbc:postgresql://{{ db_host }}:5432/payment_db"
      DATASOURCE_USERNAME: postgres
      DATASOURCE_PASSWORD: "{{ db_password }}"
      SPRING_RABBITMQ_HOST: "{{ rabbitmq_host }}"
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_CLOUD_CONFIG_URI: "http://{{ config_host }}:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://{{ eureka_host }}:8761/eureka"
      KEYCLOAK_ISSUER_URI: "{{ keycloak_issuer_uri }}"
      INTERNAL_API_KEY: "{{ internal_api_key }}"

# 5. Order Service  (PostgreSQL + RabbitMQ, calls user-service and payment-service)
- import_playbook: deploy-service.yml
  vars:
    target_hosts: order_servers
    service_name: order-service
    service_port: 8083
    jar_s3_path: "s3://{{ s3_bucket | default('ms-learning-artifacts') }}/{{ build_number }}/order-service.jar"
    env_vars:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8083"
      DB_URL: "jdbc:postgresql://{{ db_host }}:5432/order_db"
      DB_USERNAME: postgres
      DB_PASSWORD: "{{ db_password }}"
      SPRING_RABBITMQ_HOST: "{{ rabbitmq_host }}"
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      USER_SERVICE_URL: "http://{{ user_service_host }}:8081"
      PAYMENT_SERVICE_URL: "http://{{ payment_service_host }}:8082"
      SPRING_CLOUD_CONFIG_URI: "http://{{ config_host }}:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://{{ eureka_host }}:8761/eureka"
      KEYCLOAK_ISSUER_URI: "{{ keycloak_issuer_uri }}"
      INTERNAL_API_KEY: "{{ internal_api_key }}"

# 6. API Gateway  (last — routes all external traffic via Eureka)
- import_playbook: deploy-service.yml
  vars:
    target_hosts: gateway_servers
    service_name: api-gateway
    service_port: 8080
    jar_s3_path: "s3://{{ s3_bucket | default('ms-learning-artifacts') }}/{{ build_number }}/api-gateway.jar"
    env_vars:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8080"
      INTERNAL_API_KEY: "{{ internal_api_key }}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://{{ eureka_host }}:8761/eureka"
      EUREKA_URL: "http://{{ eureka_host }}:8761/eureka"
