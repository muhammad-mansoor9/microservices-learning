---
- name: Install Amazon Corretto 21 on all hosts
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Install Amazon Corretto 21
      ansible.builtin.yum:
        name: java-21-amazon-corretto-headless
        state: present

    - name: Set Corretto 21 as the default JVM
      community.general.alternatives:
        name: java
        path: /usr/lib/jvm/java-21-amazon-corretto/bin/java

    - name: Verify Java version
      ansible.builtin.command: java -version
      register: java_ver
      changed_when: false

    - name: Print Java version
      ansible.builtin.debug:
        msg: "{{ java_ver.stderr }}"
