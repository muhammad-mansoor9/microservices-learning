---
# Installs Prometheus + Grafana on the monitoring EC2 instance.
#
# Required extra vars (set by Jenkinsfile or passed manually):
#   prometheus_version  — e.g. 2.53.0  (default below)
#   grafana_version     — e.g. 11.1.0  (default below)
#
# The playbook resolves app-server private IPs from the dynamic inventory
# (groups['app_servers']) and renders prometheus.yml.j2 with those IPs.

- name: Install Prometheus and Grafana on monitoring host
  hosts: monitoring
  become: true
  vars:
    prometheus_version: "2.53.0"
    grafana_version: "11.1.0"
    prometheus_user: prometheus
    prometheus_dir: /opt/prometheus
    prometheus_config: /etc/prometheus/prometheus.yml
    grafana_datasources_dir: /etc/grafana/provisioning/datasources

  tasks:

    # ── Prometheus ─────────────────────────────────────────────────────────────

    - name: Create prometheus system user
      ansible.builtin.user:
        name: "{{ prometheus_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Create prometheus directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_user }}"
        mode: "0755"
      loop:
        - "{{ prometheus_dir }}"
        - /etc/prometheus
        - /var/lib/prometheus

    - name: Download Prometheus archive
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
        dest: "/tmp/prometheus-{{ prometheus_version }}.tar.gz"
        mode: "0644"

    - name: Extract Prometheus archive
      ansible.builtin.unarchive:
        src: "/tmp/prometheus-{{ prometheus_version }}.tar.gz"
        dest: /tmp
        remote_src: true

    - name: Install Prometheus binaries
      ansible.builtin.copy:
        src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        owner: root
        group: root
        mode: "0755"
        remote_src: true
      loop:
        - prometheus
        - promtool

    - name: Deploy prometheus.yml from template
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../monitoring/prometheus.yml.j2"
        dest: "{{ prometheus_config }}"
        owner: "{{ prometheus_user }}"
        group: "{{ prometheus_user }}"
        mode: "0644"
      notify: Restart prometheus

    - name: Install Prometheus systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/prometheus.service
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus
          Wants=network-online.target
          After=network-online.target

          [Service]
          User={{ prometheus_user }}
          Group={{ prometheus_user }}
          Type=simple
          ExecStart=/usr/local/bin/prometheus \
            --config.file={{ prometheus_config }} \
            --storage.tsdb.path=/var/lib/prometheus \
            --web.listen-address=0.0.0.0:9090
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
      notify: Restart prometheus

    - name: Enable and start Prometheus
      ansible.builtin.systemd:
        name: prometheus
        enabled: true
        state: started
        daemon_reload: true

    # ── Grafana ────────────────────────────────────────────────────────────────

    - name: Add Grafana GPG key
      ansible.builtin.rpm_key:
        key: https://rpm.grafana.com/gpg.key
        state: present

    - name: Add Grafana yum repository
      ansible.builtin.yum_repository:
        name: grafana
        description: Grafana OSS repository
        baseurl: https://rpm.grafana.com
        gpgcheck: true
        enabled: true

    - name: Install Grafana
      ansible.builtin.dnf:
        name: "grafana-{{ grafana_version }}"
        state: present

    - name: Create Grafana provisioning datasources directory
      ansible.builtin.file:
        path: "{{ grafana_datasources_dir }}"
        state: directory
        owner: grafana
        group: grafana
        mode: "0755"

    - name: Provision Prometheus datasource in Grafana
      ansible.builtin.copy:
        dest: "{{ grafana_datasources_dir }}/prometheus.yml"
        owner: grafana
        group: grafana
        mode: "0640"
        content: |
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: http://localhost:9090
              isDefault: true
              editable: false
      notify: Restart grafana

    - name: Enable and start Grafana
      ansible.builtin.systemd:
        name: grafana-server
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Restart prometheus
      ansible.builtin.systemd:
        name: prometheus
        state: restarted
        daemon_reload: true

    - name: Restart grafana
      ansible.builtin.systemd:
        name: grafana-server
        state: restarted
