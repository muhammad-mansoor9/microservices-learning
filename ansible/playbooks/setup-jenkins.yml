---
- name: Install and configure Jenkins with all build dependencies
  hosts: jenkins
  become: true

  tasks:
    - name: Install Java, Git, Maven
      ansible.builtin.dnf:
        name:
          - java-21-amazon-corretto-headless
          - git
          - maven
        state: present

    - name: Install pip and Python deps for Ansible AWS dynamic inventory
      ansible.builtin.dnf:
        name:
          - python3-pip
        state: present

    - name: Install Ansible, boto3, botocore system-wide
      ansible.builtin.pip:
        name:
          - ansible
          - boto3
          - botocore
        executable: pip3
        extra_args: --prefix /usr/local

    - name: Install AWS CLI
      ansible.builtin.dnf:
        name: awscli
        state: present

    - name: Install amazon.aws Ansible collection system-wide
      ansible.builtin.command: /usr/local/bin/ansible-galaxy collection install amazon.aws --collections-path /usr/share/ansible/collections
      changed_when: false

    - name: Add Jenkins repo
      ansible.builtin.get_url:
        url: https://pkg.jenkins.io/redhat-stable/jenkins.repo
        dest: /etc/yum.repos.d/jenkins.repo
        mode: "0644"

    - name: Import Jenkins RPM key
      ansible.builtin.rpm_key:
        key: https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key
        state: present

    - name: Install Jenkins
      ansible.builtin.dnf:
        name: jenkins
        state: present

    - name: Create Jenkins systemd override directory
      ansible.builtin.file:
        path: /etc/systemd/system/jenkins.service.d
        state: directory
        mode: "0755"

    - name: Set JAVA_HOME for Jenkins service
      ansible.builtin.copy:
        dest: /etc/systemd/system/jenkins.service.d/override.conf
        mode: "0644"
        content: |
          [Service]
          Environment="JAVA_HOME=/usr/lib/jvm/java-21-amazon-corretto"

    - name: Reload systemd after override
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Start and enable Jenkins
      ansible.builtin.systemd:
        name: jenkins
        state: started
        enabled: true

    - name: Wait for Jenkins to start on port 8080
      ansible.builtin.wait_for:
        port: 8080
        timeout: 60

    - name: Print Jenkins initial admin password
      ansible.builtin.command: cat /var/lib/jenkins/secrets/initialAdminPassword
      register: jenkins_password
      changed_when: false

    - name: Show Jenkins initial admin password
      ansible.builtin.debug:
        msg: "Jenkins initial admin password: {{ jenkins_password.stdout }}"
