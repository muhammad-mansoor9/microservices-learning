---
- name: Install and configure Jenkins with all build dependencies
  hosts: jenkins
  become: true

  tasks:
    - name: Install Java, Git, Maven
      ansible.builtin.dnf:
        name:
          - java-21-amazon-corretto-headless
          - git
          - maven
        state: present

    - name: Install pip and Python deps for Ansible AWS dynamic inventory
      ansible.builtin.dnf:
        name:
          - python3-pip
        state: present

    - name: Install Ansible, boto3, botocore system-wide (via sudo pip3)
      ansible.builtin.shell: pip3 install --upgrade ansible boto3 botocore
      changed_when: false

    - name: Install AWS CLI
      ansible.builtin.dnf:
        name: awscli
        state: present

    - name: Install amazon.aws Ansible collection system-wide
      ansible.builtin.shell: ansible-galaxy collection install amazon.aws
      changed_when: false

    - name: Add Jenkins repo
      ansible.builtin.get_url:
        url: https://pkg.jenkins.io/redhat-stable/jenkins.repo
        dest: /etc/yum.repos.d/jenkins.repo
        mode: "0644"

    - name: Import Jenkins RPM key
      ansible.builtin.rpm_key:
        key: https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key
        state: present

    - name: Install Jenkins
      ansible.builtin.dnf:
        name: jenkins
        state: present

    - name: Create Jenkins systemd override directory
      ansible.builtin.file:
        path: /etc/systemd/system/jenkins.service.d
        state: directory
        mode: "0755"

    - name: Set JAVA_HOME for Jenkins service
      ansible.builtin.copy:
        dest: /etc/systemd/system/jenkins.service.d/override.conf
        mode: "0644"
        content: |
          [Service]
          Environment="JAVA_HOME=/usr/lib/jvm/java-21-amazon-corretto"

    - name: Reload systemd after override
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Start and enable Jenkins
      ansible.builtin.systemd:
        name: jenkins
        state: started
        enabled: true

    - name: Wait for Jenkins to start on port 8080
      ansible.builtin.wait_for:
        port: 8080
        timeout: 60

    - name: Print Jenkins initial admin password
      ansible.builtin.command: cat /var/lib/jenkins/secrets/initialAdminPassword
      register: jenkins_password
      changed_when: false

    - name: Show Jenkins initial admin password
      ansible.builtin.debug:
        msg: "Jenkins initial admin password: {{ jenkins_password.stdout }}"

    - name: Wait for Jenkins web UI to be ready
      ansible.builtin.uri:
        url: http://localhost:8080/login
        status_code: 200
      retries: 18
      delay: 10
      register: _jenkins_ui
      until: _jenkins_ui.status == 200

    - name: Download Jenkins CLI jar
      ansible.builtin.get_url:
        url: http://localhost:8080/jnlpJars/jenkins-cli.jar
        dest: /opt/jenkins-cli.jar
        mode: "0644"

    - name: Install required Jenkins plugins
      ansible.builtin.shell: >
        java -jar /opt/jenkins-cli.jar
        -s http://localhost:8080
        -auth "admin:{{ jenkins_password.stdout }}"
        install-plugin
        workflow-aggregator git github pipeline-aws ssh-agent credentials-binding
        -restart
      changed_when: true

    - name: Wait for Jenkins to come back up after plugin install
      ansible.builtin.wait_for:
        port: 8080
        timeout: 120
        delay: 20
