---
- name: Install and configure Keycloak (Docker)
  hosts: keycloak
  become: true

  vars:
    keycloak_admin_user: admin
    # keycloak_admin_password — pass via extra var: -e keycloak_admin_password=...

  tasks:
    - name: Install Docker
      ansible.builtin.dnf:
        name: docker
        state: present

    - name: Start and enable Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Copy ms-learning realm JSON
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../infrastructure/keycloak/ms-learning-realm.json"
        dest: /opt/ms-learning-realm.json
        mode: "0644"

    - name: Run Keycloak container (idempotent)
      ansible.builtin.shell: |
        if ! docker ps -a --format '{{ '{{' }}.Names{{ '}}' }}' | grep -q '^keycloak$'; then
          docker run -d \
            --name keycloak \
            --restart always \
            -p 9090:8080 \
            -e KEYCLOAK_ADMIN={{ keycloak_admin_user }} \
            -e KEYCLOAK_ADMIN_PASSWORD={{ keycloak_admin_password }} \
            -v /opt/ms-learning-realm.json:/opt/keycloak/data/import/ms-learning-realm.json:ro \
            quay.io/keycloak/keycloak:26.0.2 \
            start-dev --import-realm
        elif ! docker ps --format '{{ '{{' }}.Names{{ '}}' }}' | grep -q '^keycloak$'; then
          docker start keycloak
        fi
      changed_when: false

    - name: Wait for Keycloak to respond on port 9090 (can take ~90 s)
      ansible.builtin.wait_for:
        port: 9090
        timeout: 120
