---
- name: Install and configure RabbitMQ
  hosts: rabbitmq
  become: true

  tasks:
    - name: Write Erlang repo for RHEL9 / Amazon Linux 2023
      ansible.builtin.copy:
        dest: /etc/yum.repos.d/rabbitmq-erlang.repo
        mode: "0644"
        content: |
          [rabbitmq-el9-erlang]
          name=Erlang for RabbitMQ (el9 / Amazon Linux 2023)
          baseurl=https://dl.cloudsmith.io/public/rabbitmq/rabbitmq-erlang/rpm/el/9/$basearch
          gpgcheck=1
          gpgkey=https://dl.cloudsmith.io/public/rabbitmq/rabbitmq-erlang/gpg.E495BB49CC4BBE5B.key
          repo_gpgcheck=0
          enabled=1
          sslverify=1
          sslcacert=/etc/pki/tls/certs/ca-bundle.crt
          metadata_expire=300

    - name: Write RabbitMQ server repo for RHEL9 / Amazon Linux 2023
      ansible.builtin.copy:
        dest: /etc/yum.repos.d/rabbitmq-server.repo
        mode: "0644"
        content: |
          [rabbitmq-server]
          name=RabbitMQ Server (el9 / Amazon Linux 2023)
          baseurl=https://dl.cloudsmith.io/public/rabbitmq/rabbitmq-server/rpm/el/9/$basearch
          gpgcheck=1
          gpgkey=https://dl.cloudsmith.io/public/rabbitmq/rabbitmq-server/gpg.9F4587D7.key
          repo_gpgcheck=0
          enabled=1
          sslverify=1
          sslcacert=/etc/pki/tls/certs/ca-bundle.crt
          metadata_expire=300

    - name: Install Erlang and RabbitMQ
      ansible.builtin.dnf:
        name:
          - erlang
          - rabbitmq-server
        state: present

    - name: Write rabbitmq.conf (allow guest from non-localhost for dev)
      ansible.builtin.copy:
        dest: /etc/rabbitmq/rabbitmq.conf
        mode: "0644"
        content: |
          loopback_users.guest = false
          management.listener.port = 15672

    - name: Enable and start RabbitMQ
      ansible.builtin.systemd:
        name: rabbitmq-server
        state: started
        enabled: true

    - name: Enable management UI plugin
      ansible.builtin.command: rabbitmq-plugins enable rabbitmq_management
      changed_when: true
      notify: Restart RabbitMQ

    - name: Wait for RabbitMQ AMQP port to be ready
      ansible.builtin.wait_for:
        port: 5672
        timeout: 60

  handlers:
    - name: Restart RabbitMQ
      ansible.builtin.systemd:
        name: rabbitmq-server
        state: restarted
