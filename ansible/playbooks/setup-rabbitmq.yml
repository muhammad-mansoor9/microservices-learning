---
- name: Install and configure RabbitMQ (Docker)
  hosts: rabbitmq
  become: true

  tasks:
    - name: Install Docker
      ansible.builtin.dnf:
        name: docker
        state: present

    - name: Start and enable Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Pull RabbitMQ management image
      ansible.builtin.command: docker pull rabbitmq:3-management
      changed_when: false

    - name: Run RabbitMQ container (idempotent)
      ansible.builtin.shell: |
        if ! docker ps -a --format '{{ '{{' }}.Names{{ '}}' }}' | grep -q '^rabbitmq$'; then
          docker run -d \
            --name rabbitmq \
            --restart always \
            -p 5672:5672 \
            -p 15672:15672 \
            rabbitmq:3-management
        elif ! docker ps --format '{{ '{{' }}.Names{{ '}}' }}' | grep -q '^rabbitmq$'; then
          docker start rabbitmq
        fi
      changed_when: false

    - name: Wait for RabbitMQ AMQP port to be ready
      ansible.builtin.wait_for:
        port: 5672
        timeout: 60
