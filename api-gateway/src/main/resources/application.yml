server:
  port: 8080

spring:
  application:
    name: api-gateway
  profiles:
    active: local
  cloud:
    gateway:
      # Injected on every forwarded request — gateway is the internal trust boundary.
      # External callers do not need to send this header.
      default-filters:
        - AddRequestHeader=X-Internal-Api-Key, ${internal.api.key}
      routes:
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

internal:
  api:
    key: local-dev-key

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
