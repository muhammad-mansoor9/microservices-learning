# Centralised configuration for order-service
# Values here are merged with the service's own application.yml at startup.

# Shared internal API key — rotate this value to re-key all services at once.
# Set to a strong random secret in production.
internal:
  api:
    key: ${INTERNAL_API_KEY:local-dev-key}

