spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/order_db
    username: postgres
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
  cloud:
    config:
      uri: http://config-server:8888
    function:
      definition: paymentApproved;paymentFailed
    stream:
      bindings:
        order-events-out-0:
          destination: order.events
        paymentApproved-in-0:
          destination: payment.events
          group: order-service-approved
        paymentFailed-in-0:
          destination: payment.events
          group: order-service-failed
      rabbit:
        bindings:
          order-events-out-0:
            producer:
              exchange-type: topic
              routing-key-expression: headers['routingKey']
          paymentApproved-in-0:
            consumer:
              exchange-type: topic
              binding-routing-key: payment.approved
              auto-bind-dlq: true
              dead-letter-queue-name: payment.events.dlq
          paymentFailed-in-0:
            consumer:
              exchange-type: topic
              binding-routing-key: payment.failed
              auto-bind-dlq: true
              dead-letter-queue-name: payment.events.dlq
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

services:
  user-service-url: http://user-service:8083
  payment-service-url: http://payment-service:8082

internal:
  api:
    key: ${INTERNAL_API_KEY:docker-dev-key}

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/

management:
  endpoint:
    health:
      show-details: always
